repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
    -   id: golangci-lint
        args: [--timeout=5m]

-   repo: local
    hooks:
    -   id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        types: [go]
        pass_filenames: false
    -   id: gofmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        types: [go]
